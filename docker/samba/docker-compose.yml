version: "3.4"

services:
  samba:
    image: dperson/samba
    container_name: samba
    ports:
      - "137:137/udp"
      - "138:138/udp"
      - "139:139/tcp"
      - "445:445/tcp"
    restart: always
    volumes:
      - /mnt/ssd/smb:/media
    command:  '-u "poli;${PSSWD}" -s "Compartido;/media;yes;no;no;poli"'